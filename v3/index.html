<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; -webkit-tap-highlight-color: transparent; }
  body {
    height: 100%; overflow: hidden;
    font-family: "Inter", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","cv11";
    background: #050507;
  }
  #root { width: 100vw; height: 100vh; height: 100dvh; overflow: hidden; }
  ::-webkit-scrollbar { display: none; }
  input, button { outline: none; border: none; background: none; }
  @keyframes neonPulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 16px currentColor); }
    50% { opacity: 0.9; filter: drop-shadow(0 0 4px currentColor) drop-shadow(0 0 8px currentColor); }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  @keyframes glitch {
    0%, 100% { text-shadow: 0 0 0 transparent; }
    20% { text-shadow: 2px 0 #FF2D9C, -2px 0 #00E5FF; }
    40% { text-shadow: -2px 0 #FF2D9C, 2px 0 #00E5FF; }
  }
  .grid-bg {
    background-image:
      linear-gradient(rgba(255,45,156,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
  }
</style>

<script type="text/babel">

  // STORE COLORS (4 different neons)
  gochi:   '#FFB627',  // amber

  goro:    '#00FF88',  // neon green

const STORES = [

const FSANS = '"Inter", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SB_URL = 'https://jpjqdpzbaujxholvzlto.supabase.co';
const SB_KEY = 'sb_publishable_j6hImkmNd2S1zXHDfSo4iw_DCF5nL0c';
const db = window.supabase.createClient(SB_URL, SB_KEY);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► UTILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const yen   = n => '¥' + Math.round(n).toLocaleString('en-US');
const yenK  = n => { if(n>=10000000) return '¥'+(n/1000000).toFixed(1)+'M'; if(n>=10000) return '¥'+(n/1000).toFixed(0)+'K'; return '¥'+Math.round(n).toLocaleString(); };
const toYMD = d => { const p=v=>String(v).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
const wkEN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const wkJP = ['日','月','火','水','木','金','土'];
const halfStart = (dateStr) => { const d=new Date(dateStr); const day=d.getDate(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${day<16?'01':'16'}`; };
const rankBySales = (sales) => {
  const m={}; for(const s of sales){ m[s.player]=(m[s.player]||0)+s.amount; }
  return Object.entries(m).map(([p,t])=>({player:p,total:t})).sort((a,b)=>b.total-a.total);
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► ICONS — geometric, sharp-edged
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const I = {
  rec:  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 19v2h2l11-11-2-2L3 19zM16.7 6.3l2-2 2 2-2 2-2-2z" fill="currentColor"/></svg>,
  rank: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="5" height="8" fill="currentColor"/><rect x="9.5" y="7" width="5" height="14" fill="currentColor"/><rect x="16" y="10" width="5" height="11" fill="currentColor"/></svg>,
  cal:  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" stroke="currentColor" strokeWidth="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" strokeWidth="2"/></svg>,
  user: <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="2"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7" stroke="currentColor" strokeWidth="2"/></svg>,
  set:  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="2"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 01-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 010-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8L4.2 7a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 014 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 010 4h-.1a1.7 1.7 0 00-1.5 1z" stroke="currentColor" strokeWidth="2"/></svg>,
  chev: <svg width="14" height="14" viewBox="0 0 16 16"><path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="square"/></svg>,
  chevL:<svg width="14" height="14" viewBox="0 0 16 16"><path d="M10 4l-4 4 4 4" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="square"/></svg>,
  arrowUp: <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 2l4 4H7v4H5V6H2l4-4z" fill="currentColor"/></svg>,
  arrowDn: <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 10l-4-4h3V2h2v4h3l-4 4z" fill="currentColor"/></svg>,
  bolt: <svg width="14" height="14" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" fill="currentColor"/></svg>,
  star: <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-7z" fill="currentColor"/></svg>,
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► PRIMITIVES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Glass card with neon edge
function GlassCard({ children, glow, style={}, pad=16 }) {
  return (
    <div style={{
      background: 'rgba(20,20,28,0.7)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      border: `1px solid ${N.line2}`,
      borderRadius: 4,
      padding: pad,
      position: 'relative',
      boxShadow: glow ? `0 0 0 1px ${glow}30, 0 4px 32px ${glow}20` : 'none',
      ...style,
    }}>{children}</div>
  );
}

// Section header with glitch label
function SectionHeader({ idx, label, sub, right }) {
  return (
    <div style={{ padding:'14px 18px 8px', display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
      <div>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
          <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:600, color:N.pink, letterSpacing:2 }}>// {idx || '00'}</div>
          <div style={{ width:24, height:1, background:`linear-gradient(90deg,${N.pink},transparent)` }}/>
        </div>
        <div style={{ fontFamily:FDISP, fontSize:28, fontWeight:700, color:N.text, letterSpacing:-1, lineHeight:1 }}>{label}</div>
        {sub && <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMid, marginTop:4, letterSpacing:1.5 }}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

// Neon button (sharp, glowing)
function NeonBtn({ children, color=N.pink, onClick, big, style={} }) {
  return (
    <div onClick={onClick} style={{
      padding: big ? '14px 18px' : '8px 14px',
      background:`linear-gradient(135deg, ${color}30, ${color}10)`,
      border:`1px solid ${color}`,
      color: color,
      fontFamily:FDISP, fontSize: big?15:11, fontWeight:700, letterSpacing:2,
      textTransform:'uppercase', cursor:'pointer',
      boxShadow:`0 0 12px ${color}40, inset 0 0 12px ${color}20`,
      borderRadius:2,
      ...style,
    }}>{children}</div>
  );
}

// Bottom nav — flat tabs with neon underline
function BottomNav({ active, onNav }) {
  const items = [
    { id:'rec',  label:'REC',   jp:'記録',     icon:I.rec },
    { id:'rank', label:'RANK',  jp:'ランク',   icon:I.rank },
    { id:'cal',  label:'CAL',   jp:'カレンダー', icon:I.cal },
    { id:'me',   label:'ME',    jp:'個人',     icon:I.user },
    { id:'set',  label:'SYS',   jp:'設定',     icon:I.set },
  ];
  return (
    <div style={{
      position:'absolute', left:0, right:0, bottom:0,
      paddingBottom:'env(safe-area-inset-bottom,20px)', paddingTop:10,
      background:'rgba(5,5,7,0.92)',
      backdropFilter:'blur(20px) saturate(180%)',
      WebkitBackdropFilter:'blur(20px) saturate(180%)',
      borderTop:`1px solid ${N.line2}`,
      zIndex:30,
    }}>
      {/* top accent line */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:1,
        background:`linear-gradient(90deg, transparent, ${N.pink}80, ${N.cyan}80, transparent)` }}/>
      <div style={{ display:'flex', justifyContent:'space-around' }}>
        {items.map(it => {
          const on = it.id === active;
          return (
            <div key={it.id} onClick={() => onNav(it.id)} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:3,
              color: on?N.pink:N.textMute,
              padding:'4px 12px', cursor:'pointer', position:'relative',
            }}>
              {on && (
                <div style={{
                  position:'absolute', top:-10, left:'50%', transform:'translateX(-50%)',
                  width:32, height:2, background:N.pink,
                  boxShadow:`0 0 8px ${N.pink}, 0 0 16px ${N.pink}80`,
                }}/>
              )}
              <div style={{ width:22, height:22, display:'flex', alignItems:'center', justifyContent:'center', filter: on?`drop-shadow(0 0 4px ${N.pink})`:'none' }}>{it.icon}</div>
              <div style={{ fontFamily:FMONO, fontSize:8, fontWeight:700, letterSpacing:1.5 }}>{it.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Delta({ value }) {
  const flat = value === 0;
  const pos = value > 0;
  const c = flat ? N.textMute : (pos ? N.lime : N.pink);
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:2, color:c, fontFamily:FMONO, fontSize:11, fontWeight:700 }}>
      {!flat && (pos?I.arrowUp:I.arrowDn)}
      {flat?'0%':`${pos?'+':''}${value}%`}
    </span>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► SCREEN: REC (記録)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ScreenRecord({ players, sales, currentPlayer, setCurrentPlayer, onSaved }) {
  const today = new Date();
  const dates = Array.from({length:5}, (_,i) => { const d=new Date(today); d.setDate(d.getDate()-(4-i)); return d; });
  const [selDateIdx, setSelDateIdx] = useState(4);
  const [activeStore, setActiveStore] = useState('dosu');
  const [amounts, setAmounts] = useState({ gochi:0, dosu:0, goro:0, uo:0 });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [playerOpen, setPlayerOpen] = useState(false);
  const selDate = dates[selDateIdx];
  const selDateStr = toYMD(selDate);

  useEffect(() => {
    if (!currentPlayer) return;
    const existing = sales.filter(s => s.date === selDateStr && s.player === currentPlayer.name);
    if (existing.length > 0) {
      const m = { gochi:0, dosu:0, goro:0, uo:0 };
      for (const s of existing) {
        if (s.store && m[s.store] !== undefined) m[s.store] = s.amount;
      }
      setAmounts(m);
    } else setAmounts({ gochi:0, dosu:0, goro:0, uo:0 });
  }, [selDateStr, currentPlayer, sales]);

  const total = Object.values(amounts).reduce((a,v) => a+v, 0);

  const handleKey = (k) => {
    setAmounts(prev => {
      const cur = String(prev[activeStore]);
      let next;
      if (k === '⌫') next = cur.length > 1 ? Number(cur.slice(0,-1)) : 0;
      else next = Number(cur === '0' ? k : cur + k);
      if (next > 9999999) next = prev[activeStore];
      return { ...prev, [activeStore]: next };
    });
  };
  const handleQuick = (add) => setAmounts(prev => ({ ...prev, [activeStore]: prev[activeStore] + add }));

  const handleSave = async () => {
    if (!currentPlayer || saving) return;
    setSaving(true);
    const hs = halfStart(selDateStr);
    const rows = STORES.filter(s => amounts[s.id] > 0).map(s => ({
      date: selDateStr, player: currentPlayer.name, store: s.id, amount: amounts[s.id], half_month_start: hs,
    }));
    if (rows.length === 0) { setSaving(false); return; }
    await db.from('sales').delete().eq('date', selDateStr).eq('player', currentPlayer.name);
    const { error } = await db.from('sales').insert(rows);
    setSaving(false);
    if (!error) { setSaved(true); setTimeout(() => setSaved(false), 2000); onSaved(); }
  };

  const activeStoreObj = STORES.find(s => s.id === activeStore);
  const hasInput = Object.values(amounts).some(v => v > 0);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <SectionHeader idx="01" label="INPUT" sub={`▸ DAILY SALES // ${selDateStr.replace(/-/g,'.')}`}
        right={
          <div style={{ position:'relative' }}>
            <div onClick={()=>setPlayerOpen(o=>!o)} style={{
              padding:'6px 10px', display:'flex', alignItems:'center', gap:6,
              border:`1px solid ${N.cyan}`, color:N.cyan, cursor:'pointer',
              fontFamily:FMONO, fontSize:11, fontWeight:700, letterSpacing:1,
              boxShadow:`0 0 8px ${N.cyan}40`, borderRadius:2,
            }}>
              <div style={{ width:18, height:18, background:N.cyan, color:N.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontWeight:700, fontSize:11, borderRadius:2 }}>
                {currentPlayer ? currentPlayer.name[0] : '?'}
              </div>
              {currentPlayer ? currentPlayer.name : 'SELECT'}
              <span style={{ opacity:0.6 }}>{I.chev}</span>
            </div>
            {playerOpen && (
              <div style={{ position:'absolute', right:0, top:'calc(100% + 6px)',
                background:N.surface, border:`1px solid ${N.cyan}40`,
                boxShadow:`0 0 16px ${N.cyan}30, 0 8px 24px rgba(0,0,0,0.6)`,
                zIndex:100, minWidth:160, borderRadius:2,
              }}>
                {players.map(p => (
                  <div key={p.id} onClick={() => { setCurrentPlayer(p); setPlayerOpen(false); }} style={{
                    padding:'10px 14px', fontFamily:FDISP, fontSize:13, fontWeight:600,
                    color: currentPlayer?.id===p.id?N.cyan:N.text, cursor:'pointer',
                    background: currentPlayer?.id===p.id?`${N.cyan}10`:'transparent',
                    borderBottom:`1px solid ${N.line}`,
                  }}>{p.name}</div>
                ))}
              </div>
            )}
          </div>
        }
      />

      {/* Date strip */}
      <div style={{ padding:'0 16px 10px' }}>
        <div style={{ display:'flex', gap:3 }}>
          {dates.map((d,i) => {
            const on = i === selDateIdx;
            return (
              <div key={i} onClick={() => setSelDateIdx(i)} style={{
                flex:1, padding:'8px 0', textAlign:'center', cursor:'pointer',
                background: on?`linear-gradient(135deg, ${N.pink}, ${N.violet})`:'transparent',
                border:on?'none':`1px solid ${N.line2}`,
                color: on?N.text:N.textMid,
                borderRadius:2,
                boxShadow: on?`0 0 12px ${N.pink}60`:'none',
              }}>
                <div style={{ fontFamily:FMONO, fontSize:8, fontWeight:700, letterSpacing:1.5, opacity:0.8 }}>{wkEN[d.getDay()]}</div>
                <div style={{ fontFamily:FDISP, fontSize:18, fontWeight:700, marginTop:1, letterSpacing:-0.5 }}>{d.getDate()}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Total */}
      <div style={{ padding:'0 16px 12px' }}>
        <div style={{
          background:`linear-gradient(135deg, ${N.pink}15, ${N.cyan}15)`,
          border:`1px solid ${N.line2}`, borderRadius:2, padding:'14px 18px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          position:'relative', overflow:'hidden',
        }}>
          <div style={{ position:'absolute', top:0, right:0, width:80, height:80, background:`radial-gradient(circle, ${N.pink}20, transparent 70%)` }}/>
          <div>
            <div style={{ fontFamily:FMONO, fontSize:9, fontWeight:700, color:N.cyan, letterSpacing:2 }}>// TOTAL</div>
            <div style={{ fontFamily:FDISP, fontSize:30, fontWeight:700, color:N.text, marginTop:2, letterSpacing:-1, lineHeight:1 }}>{yen(total)}</div>
          </div>
          <div style={{ textAlign:'right', fontFamily:FMONO, fontSize:9, color:N.textMid, letterSpacing:1 }}>
            <div style={{ color:N.lime, fontWeight:700 }}>● LIVE</div>
            <div style={{ marginTop:3 }}>{selDateStr}</div>
          </div>
        </div>
      </div>

      {/* Store grid */}
      <div style={{ padding:'0 16px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
        {STORES.map(s => {
          const on = activeStore === s.id;
          const v = amounts[s.id] || 0;
          return (
            <div key={s.id} onClick={() => setActiveStore(s.id)} style={{
              background: on?`linear-gradient(135deg, ${s.color}25, ${s.color}05)`:N.surface,
              border: on?`1px solid ${s.color}`:`1px solid ${N.line2}`,
              borderRadius:2, padding:'10px 12px', cursor:'pointer',
              boxShadow: on?`0 0 16px ${s.color}40, inset 0 0 16px ${s.color}10`:'none',
              transition:'all 0.15s', position:'relative', overflow:'hidden',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                <div style={{ width:6, height:6, background:s.color, boxShadow:on?`0 0 8px ${s.color}`:'none' }}/>
                <div style={{ fontFamily:FDISP, fontSize:13, fontWeight:700, color:on?s.color:N.text, letterSpacing:1 }}>{s.name}</div>
                <div style={{ marginLeft:'auto', fontFamily:FMONO, fontSize:8, color:N.textMute }}>{s.jp}</div>
              </div>
              <div style={{ fontFamily:FMONO, fontSize:v?16:13, fontWeight:700, color:v?N.text:N.textMute, letterSpacing:-0.5 }}>
                {v ? yen(v) : '──'}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ flex:1 }}/>

      {/* Numpad */}
      <div style={{ background:N.bg2, borderTop:`1px solid ${N.line2}`, padding:'10px 12px 0' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 4px 8px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <div style={{ width:8, height:8, background:activeStoreObj.color, boxShadow:`0 0 8px ${activeStoreObj.color}` }}/>
            <div style={{ fontFamily:FDISP, fontSize:12, fontWeight:700, color:activeStoreObj.color, letterSpacing:1 }}>{activeStoreObj.name} ◤ INPUT</div>
          </div>
          <div style={{ display:'flex', gap:4 }}>
            {[1000,5000,10000].map(q => (
              <div key={q} onClick={() => handleQuick(q)} style={{
                padding:'3px 8px', border:`1px solid ${N.lime}60`,
                fontFamily:FMONO, fontSize:9, fontWeight:700, color:N.lime, letterSpacing:1,
                cursor:'pointer', borderRadius:2,
              }}>+{q/1000}K</div>
            ))}
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:4 }}>
          {['1','2','3','4','5','6','7','8','9','000','0','⌫'].map((k,i) => {
            const isDel = k==='⌫', isAlt = k==='000'||isDel;
            return (
              <div key={k} onClick={() => handleKey(k)} style={{
                height:42, borderRadius:2, display:'flex', alignItems:'center', justifyContent:'center',
                background: isAlt?N.surface2:N.surface,
                border:`1px solid ${isDel?N.pink+'60':isAlt?N.line2:N.line}`,
                color: isDel?N.pink:N.text,
                fontFamily:FDISP, fontSize:19, fontWeight:600, cursor:'pointer',
                letterSpacing:-0.5,
              }}>{k}</div>
            );
          })}
        </div>
        <div style={{ marginTop:8, paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 80px)' }}>
          <div onClick={handleSave} style={{
            height:50, cursor:'pointer',
            background: saved?`linear-gradient(135deg, ${N.lime}, ${N.lime}DD)`:`linear-gradient(135deg, ${N.pink}, ${N.violet})`,
            color: saved?N.bg:'#fff', display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            fontFamily:FDISP, fontSize:15, fontWeight:700, letterSpacing:3,
            boxShadow: saved?`0 0 24px ${N.lime}80`:`0 0 24px ${N.pink}60, inset 0 1px 0 rgba(255,255,255,0.2)`,
            opacity:(saving||!hasInput||!currentPlayer)?0.5:1,
            borderRadius:2, position:'relative', overflow:'hidden',
          }}>
            {saving ? '◐ SAVING' : saved ? '✓ COMMITTED' : '▸ EXECUTE'}
          </div>
        </div>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► SCREEN: RANK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ScreenRanking({ sales, loading }) {
  const [mode, setMode] = useState('month');
  const now = new Date();

  const allHalves = useMemo(() => {
    const s = new Set(sales.map(r => r.half_month_start).filter(Boolean));
    return [...s].sort().reverse();
  }, [sales]);
  const allMonths = useMemo(() => {
    const s = new Set(sales.map(r => r.date.slice(0,7)));
    return [...s].sort().reverse();
  }, [sales]);

  const curMonthYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const curHalfKey = halfStart(toYMD(now));

  const defaultHalf  = allHalves.includes(curHalfKey)  ? curHalfKey  : (allHalves[0] || curHalfKey);
  const defaultMonth = allMonths.includes(curMonthYM)  ? curMonthYM  : (allMonths[0] || curMonthYM);

  const [selHalf,  setSelHalf]  = useState(null);
  const [selMonth, setSelMonth] = useState(null);
  useEffect(() => {
    if (allHalves.length > 0 && selHalf  === null) setSelHalf(defaultHalf);
    if (allMonths.length > 0 && selMonth === null) setSelMonth(defaultMonth);
  }, [allHalves, allMonths]);

  const activeHalf  = selHalf  || curHalfKey;
  const activeMonth = selMonth || curMonthYM;

  const navigateHalf  = (d) => { const i=allHalves.indexOf(activeHalf); const n=i+d; if(n>=0&&n<allHalves.length) setSelHalf(allHalves[n]); };
  const navigateMonth = (d) => { const i=allMonths.indexOf(activeMonth); const n=i+d; if(n>=0&&n<allMonths.length) setSelMonth(allMonths[n]); };

  const filtered = useMemo(() => {
    if (mode === 'half') return sales.filter(s => s.half_month_start === activeHalf);
    return sales.filter(s => s.date.startsWith(activeMonth));
  }, [sales, mode, activeHalf, activeMonth]);

  const ranking = useMemo(() => rankBySales(filtered), [filtered]);
  const totalSales = ranking.reduce((a,r) => a+r.total, 0);

  const isCurrentMonth = activeMonth === curMonthYM;
  const periodDate = new Date(activeMonth + '-01');
  const daysInMonth = new Date(periodDate.getFullYear(), periodDate.getMonth()+1, 0).getDate();
  const dayOfMonth  = isCurrentMonth ? now.getDate() : daysInMonth;
  const projection  = mode === 'month' && totalSales > 0 && isCurrentMonth ? Math.round(totalSales / dayOfMonth * daysInMonth) : null;

  const hero = ranking[0];
  const silver = ranking[1];
  const bronze = ranking[2];

  const periodLabel = mode === 'half'
    ? `${activeHalf.replace(/-/g,'.')} ─ HALF`
    : `${activeMonth.replace('-','.')} ─ ${dayOfMonth}/${daysInMonth}D`;

  const canNavNewer = mode === 'half' ? allHalves.indexOf(activeHalf) > 0 : allMonths.indexOf(activeMonth) > 0;
  const canNavOlder = mode === 'half' ? allHalves.indexOf(activeHalf) < allHalves.length-1 : allMonths.indexOf(activeMonth) < allMonths.length-1;

  return (
    <div style={{ height:'100%', overflow:'auto', paddingBottom:90 }}>
      <SectionHeader idx="02" label="RANK" sub={`▸ ${periodLabel}`}
        right={
          <div style={{ display:'flex', gap:3 }}>
            {[{ico:I.chevL,fn:()=>mode==='half'?navigateHalf(1):navigateMonth(1),dis:!canNavOlder},
              {ico:I.chev, fn:()=>mode==='half'?navigateHalf(-1):navigateMonth(-1),dis:!canNavNewer}].map(({ico,fn,dis},i)=>(
              <div key={i} onClick={dis?null:fn} style={{
                width:28, height:28, border:`1px solid ${dis?N.line:N.cyan+'60'}`,
                display:'flex', alignItems:'center', justifyContent:'center', cursor:dis?'default':'pointer',
                color:dis?N.textMute:N.cyan, opacity:dis?0.3:1, borderRadius:2,
                boxShadow:dis?'none':`0 0 8px ${N.cyan}30`,
              }}>{ico}</div>
            ))}
          </div>
        }
      />

      {/* Mode tabs */}
      <div style={{ padding:'0 16px 16px' }}>
        <div style={{ display:'flex', gap:4 }}>
          {[['half','HALF','半月'],['month','MONTH','月間']].map(([m,en,jp]) => (
            <div key={m} onClick={() => setMode(m)} style={{
              flex:1, padding:'10px 0', textAlign:'center', cursor:'pointer',
              background: mode===m?`linear-gradient(135deg, ${N.pink}30, ${N.violet}30)`:'transparent',
              border: mode===m?`1px solid ${N.pink}`:`1px solid ${N.line2}`,
              borderRadius:2,
              boxShadow: mode===m?`0 0 12px ${N.pink}40`:'none',
            }}>
              <div style={{ fontFamily:FDISP, fontSize:13, fontWeight:700, color: mode===m?N.text:N.textMid, letterSpacing:2 }}>{en}</div>
              <div style={{ fontFamily:FMONO, fontSize:8, color: mode===m?N.pinkSoft:N.textMute, marginTop:1, letterSpacing:1 }}>{jp}</div>
            </div>
          ))}
        </div>
      </div>

      {loading ? (
        <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:8 }}>
          {[1,2,3].map(i => <div key={i} style={{ height:64, background:N.surface, border:`1px solid ${N.line}`, borderRadius:2 }}/>)}
        </div>
      ) : ranking.length === 0 ? (
        <div style={{ padding:'60px 20px', textAlign:'center', color:N.textMid, fontFamily:FMONO, fontSize:11, letterSpacing:2 }}>
          ◯ NO DATA
        </div>
      ) : (
        <>
          {/* Projection card */}
          {projection && (
            <div style={{ margin:'0 16px 14px' }}>
              <GlassCard glow={N.cyan} pad={16}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:10 }}>
                  <span style={{ color:N.cyan }}>{I.bolt}</span>
                  <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:700, color:N.cyan, letterSpacing:2 }}>PROJECTION_EOM</div>
                </div>
                <div style={{ display:'flex', alignItems:'flex-end', gap:14 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:FDISP, fontSize:32, fontWeight:700, color:N.text, letterSpacing:-1.5, lineHeight:1 }}>{yen(projection)}</div>
                    <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMid, marginTop:4 }}>
                      NOW <span style={{ color:N.text, fontWeight:700 }}>{yen(totalSales)}</span>
                      <span style={{ color:N.lime, marginLeft:8 }}>+{yen(projection-totalSales)}</span>
                    </div>
                  </div>
                  <div style={{ position:'relative', width:64, height:64 }}>
                    <svg width="64" height="64" viewBox="0 0 64 64">
                      <circle cx="32" cy="32" r="26" fill="none" stroke={N.surface2} strokeWidth="4"/>
                      <circle cx="32" cy="32" r="26" fill="none" stroke={N.cyan} strokeWidth="4" strokeLinecap="square"
                        strokeDasharray={`${163.4 * Math.min(totalSales/projection,1)} 163.4`}
                        transform="rotate(-90 32 32)"
                        style={{ filter:`drop-shadow(0 0 4px ${N.cyan})` }}/>
                    </svg>
                    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:14, fontWeight:700, color:N.cyan }}>
                      {Math.round(totalSales/projection*100)}%
                    </div>
                  </div>
                </div>
              </GlassCard>
            </div>
          )}

          {/* Hero #1 */}
          {hero && (
            <div style={{ margin:'0 16px 12px', position:'relative', overflow:'hidden' }}>
              <div style={{
                background:`linear-gradient(135deg, ${N.pink}20, ${N.violet}20, ${N.cyan}10)`,
                border:`1px solid ${N.pink}`, borderRadius:2, padding:'20px 18px',
                boxShadow:`0 0 32px ${N.pink}40, inset 0 0 32px ${N.pink}10`,
                position:'relative', overflow:'hidden',
              }}>
                {/* corner crosses */}
                {[[0,0],[0,1],[1,0],[1,1]].map(([x,y],i)=>(
                  <div key={i} style={{
                    position:'absolute', [x?'right':'left']:8, [y?'bottom':'top']:8,
                    width:12, height:12, color:N.pink,
                  }}>
                    <svg width="12" height="12" viewBox="0 0 12 12"><path d="M0 6h12M6 0v12" stroke="currentColor" strokeWidth="1"/></svg>
                  </div>
                ))}

                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
                  <span style={{ color:N.pink, animation:'neonPulse 2s infinite' }}>{I.star}</span>
                  <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:700, color:N.pink, letterSpacing:3 }}>RANK_01 // CHAMPION</div>
                </div>

                <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{
                    width:64, height:64, background:`linear-gradient(135deg, ${N.pink}, ${N.violet})`,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontFamily:FDISP, fontSize:32, fontWeight:700, color:'#fff',
                    boxShadow:`0 0 24px ${N.pink}80, inset 0 1px 0 rgba(255,255,255,0.3)`,
                    borderRadius:2, position:'relative',
                  }}>{hero.player[0]}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:FDISP, fontSize:22, fontWeight:700, color:N.text, letterSpacing:-0.5 }}>{hero.player}</div>
                    <div style={{ fontFamily:FDISP, fontSize:32, fontWeight:700, color:N.pink, letterSpacing:-1.5, lineHeight:1, marginTop:4, textShadow:`0 0 20px ${N.pink}` }}>{yen(hero.total)}</div>
                    {ranking.length > 1 && (
                      <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMid, marginTop:4 }}>
                        Δ +{yen(hero.total-ranking[1].total)} <span style={{ color:N.lime }}>vs #2</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 2 & 3 */}
          {(silver || bronze) && (
            <div style={{ padding:'0 16px 12px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
              {[silver, bronze].map((p,i) => {
                if (!p) return <div key={i}/>;
                const c = i===0?N.cyan:N.amber;
                return (
                  <div key={i} style={{
                    background:N.surface, border:`1px solid ${c}`, borderRadius:2,
                    padding:'12px 12px', position:'relative',
                    boxShadow:`0 0 16px ${c}30`,
                  }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <div style={{ width:36, height:36, background:`linear-gradient(135deg, ${c}, ${c}AA)`, color:N.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:18, fontWeight:700, borderRadius:2 }}>{p.player[0]}</div>
                      <div>
                        <div style={{ fontFamily:FMONO, fontSize:9, fontWeight:700, color:c, letterSpacing:2 }}>RANK_0{i+2}</div>
                        <div style={{ fontFamily:FDISP, fontSize:13, fontWeight:700, color:N.text, marginTop:1 }}>{p.player}</div>
                      </div>
                    </div>
                    <div style={{ fontFamily:FDISP, fontSize:18, fontWeight:700, color:c, marginTop:8, letterSpacing:-0.5 }}>{yen(p.total)}</div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 4+ */}
          {ranking.length > 3 && (
            <div style={{ padding:'0 16px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 0 8px' }}>
                <div style={{ width:6, height:6, background:N.lime, boxShadow:`0 0 6px ${N.lime}` }}/>
                <div style={{ fontFamily:FMONO, fontSize:9, fontWeight:700, color:N.lime, letterSpacing:2 }}>// REMAINING</div>
                <div style={{ flex:1, height:1, background:`linear-gradient(90deg,${N.lime}40,transparent)` }}/>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                {ranking.slice(3).map((r,i) => (
                  <div key={r.player} style={{
                    display:'flex', alignItems:'center', gap:10, padding:'9px 12px',
                    background:N.surface, border:`1px solid ${N.line2}`, borderRadius:2,
                  }}>
                    <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:700, color:N.textMute, width:24 }}>0{i+4}</div>
                    <div style={{ width:28, height:28, background:N.surface3, color:N.text, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:13, fontWeight:700, borderRadius:2 }}>{r.player[0]}</div>
                    <div style={{ flex:1, fontFamily:FDISP, fontSize:13, fontWeight:600, color:N.text }}>{r.player}</div>
                    <div style={{ fontFamily:FMONO, fontSize:13, fontWeight:700, color:N.text }}>{yen(r.total)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► SCREEN: CAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ScreenCalendar({ sales, players, loading }) {
  const now = new Date();
  const [viewYear, setViewYear]   = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth()+1);
  const [selectedDay, setSelectedDay] = useState(now.getDate());
  const [filterPlayer, setFilterPlayer] = useState(null);

  const changeMonth = (delta) => {
    let y=viewYear, m=viewMonth+delta;
    if (m<1) { y--; m=12; } if (m>12) { y++; m=1; }
    setViewYear(y); setViewMonth(m); setSelectedDay(1);
  };

  const monthPrefix = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  const isCurrentMonth = viewYear === now.getFullYear() && viewMonth === now.getMonth()+1;

  const filteredSales = useMemo(() => {
    if (!filterPlayer) return sales;
    return sales.filter(s => s.player === filterPlayer.name);
  }, [sales, filterPlayer]);

  const byDate = useMemo(() => {
    const m = {};
    for (const s of filteredSales) {
      if (!s.date.startsWith(monthPrefix)) continue;
      if (!m[s.date]) m[s.date] = { total:0, stores:new Set() };
      m[s.date].total += s.amount;
      if (s.store) m[s.date].stores.add(s.store);
    }
    return m;
  }, [filteredSales, monthPrefix]);

  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  const firstDow    = new Date(viewYear, viewMonth-1, 1).getDay();

  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const selDateStr = `${monthPrefix}-${String(selectedDay).padStart(2,'0')}`;
  const selData = byDate[selDateStr];
  const selStoreSales = useMemo(() => {
    const rows = filteredSales.filter(s => s.date === selDateStr);
    const m = {};
    for (const s of rows) { if (s.store) m[s.store] = (m[s.store]||0) + s.amount; }
    return m;
  }, [filteredSales, selDateStr]);

  const selPlayerSales = useMemo(() => {
    if (filterPlayer) return null;
    const rows = sales.filter(s => s.date === selDateStr);
    const m = {};
    for (const s of rows) m[s.player] = (m[s.player]||0) + s.amount;
    return Object.entries(m).map(([p,t])=>({ player:p, total:t })).sort((a,b)=>b.total-a.total);
  }, [sales, selDateStr, filterPlayer]);

  const monthTotal = Object.values(byDate).reduce((a,v) => a+v.total, 0);
  const workedDays = Object.keys(byDate).length;
  const dayAvg = workedDays > 0 ? Math.round(monthTotal/workedDays) : 0;

  return (
    <div style={{ height:'100%', overflow:'auto', paddingBottom:90 }}>
      <SectionHeader idx="03" label="CAL" sub={`▸ ${viewYear}.${String(viewMonth).padStart(2,'0')}`}
        right={
          <div style={{ display:'flex', gap:3 }}>
            {[{ico:I.chevL,fn:()=>changeMonth(-1)},{ico:I.chev,fn:()=>changeMonth(1)}].map(({ico,fn},i)=>(
              <div key={i} onClick={fn} style={{
                width:28, height:28, border:`1px solid ${N.cyan}60`,
                display:'flex', alignItems:'center', justifyContent:'center',
                color:N.cyan, cursor:'pointer', borderRadius:2,
                boxShadow:`0 0 8px ${N.cyan}30`,
              }}>{ico}</div>
            ))}
          </div>
        }
      />

      {/* Player chips */}
      <div style={{ padding:'0 0 12px', overflowX:'auto' }}>
        <div style={{ display:'flex', gap:4, padding:'0 16px', minWidth:'max-content' }}>
          <div onClick={() => setFilterPlayer(null)} style={{
            flexShrink:0, display:'flex', alignItems:'center', gap:5, padding:'5px 10px',
            background: !filterPlayer?`linear-gradient(135deg, ${N.pink}, ${N.violet})`:'transparent',
            border:!filterPlayer?'none':`1px solid ${N.line2}`,
            color:!filterPlayer?'#fff':N.textMid,
            cursor:'pointer', borderRadius:2,
            boxShadow:!filterPlayer?`0 0 12px ${N.pink}40`:'none',
            fontFamily:FDISP, fontSize:11, fontWeight:700, letterSpacing:1.5,
          }}>
            ALL
          </div>
          {players.map(p => {
            const on = filterPlayer?.id === p.id;
            return (
              <div key={p.id} onClick={() => setFilterPlayer(p)} style={{
                flexShrink:0, display:'flex', alignItems:'center', gap:5,
                padding:on?'4px 10px 4px 4px':'4px',
                background:on?`linear-gradient(135deg, ${N.cyan}, ${N.cyan}DD)`:N.surface,
                border:on?'none':`1px solid ${N.line2}`,
                color:on?N.bg:N.textMid, cursor:'pointer', borderRadius:2,
                boxShadow:on?`0 0 12px ${N.cyan}50`:'none',
              }}>
                <div style={{ width:24, height:24, background:on?N.bg:N.surface2, color:on?N.cyan:N.text, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:11, fontWeight:700, borderRadius:1 }}>
                  {p.name[0]}
                </div>
                {on && <div style={{ fontFamily:FDISP, fontSize:11, fontWeight:700, letterSpacing:1 }}>{p.name}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* KPIs */}
      <div style={{ padding:'0 16px 10px', display:'flex', gap:6 }}>
        {[
          { l: filterPlayer?`${filterPlayer.name}/MO`:'TOTAL', v: loading?'…':yen(monthTotal), c: N.pink },
          { l:'AVG_DAY',   v: loading?'…':yen(dayAvg),     c: N.cyan },
          { l:'DAYS_ACTV', v: loading?'…':`${workedDays}D`, c: N.lime },
        ].map(kpi => (
          <div key={kpi.l} style={{
            flex:1, background:N.surface, border:`1px solid ${kpi.c}40`,
            borderRadius:2, padding:'8px 10px', position:'relative',
          }}>
            <div style={{ fontFamily:FMONO, fontSize:8, fontWeight:700, color:kpi.c, letterSpacing:1.5 }}>{kpi.l}</div>
            <div style={{ fontFamily:FDISP, fontSize:16, fontWeight:700, color:N.text, marginTop:2, letterSpacing:-0.5 }}>{kpi.v}</div>
          </div>
        ))}
      </div>

      {/* Weekday header */}
      <div style={{ padding:'0 12px 4px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3 }}>
          {wkEN.map((w,i) => (
            <div key={w} style={{ textAlign:'center', fontFamily:FMONO, fontSize:8, fontWeight:700, letterSpacing:1, color: i===0?N.pink:i===6?N.cyan:N.textMute, padding:'4px 0' }}>{w}</div>
          ))}
        </div>
      </div>

      {/* Grid */}
      <div style={{ padding:'0 12px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3 }}>
          {cells.map((d,i) => {
            if (!d) return <div key={i}/>;
            const dStr = `${monthPrefix}-${String(d).padStart(2,'0')}`;
            const dData = byDate[dStr];
            const isToday = isCurrentMonth && d === now.getDate();
            const isSel = d === selectedDay;
            const isFuture = isCurrentMonth && d > now.getDate();
            const dow = (firstDow + d - 1) % 7;
            return (
              <div key={d} onClick={() => setSelectedDay(d)} style={{
                aspectRatio:'1/1.1', borderRadius:2, cursor:'pointer',
                background: isSel?`linear-gradient(135deg, ${N.pink}40, ${N.violet}40)`:isFuture?'transparent':N.surface,
                border: isFuture?`1px dashed ${N.line}`:isSel?`1px solid ${N.pink}`:`1px solid ${N.line2}`,
                padding:'3px 4px', display:'flex', flexDirection:'column',
                boxShadow: isSel?`0 0 12px ${N.pink}50`:isToday?`0 0 6px ${N.cyan}40`:'none',
                position:'relative',
              }}>
                <div style={{ fontFamily:FDISP, fontSize:12, fontWeight:700, color:isSel?N.text:isFuture?N.textMute+'66':dow===0?N.pink:dow===6?N.cyan:N.text, letterSpacing:-0.5 }}>
                  {String(d).padStart(2,'0')}
                </div>
                {!isFuture && dData && (
                  <>
                    <div style={{ fontFamily:FMONO, fontSize:8, fontWeight:700, color:isSel?N.text:N.text, marginTop:'auto', letterSpacing:-0.3 }}>{yenK(dData.total)}</div>
                    <div style={{ display:'flex', gap:1, marginTop:2 }}>
                      {[...dData.stores].map(sid => {
                        const s = STORES.find(x=>x.id===sid);
                        return s ? <div key={sid} style={{ width:3, height:3, background:s.color, boxShadow:`0 0 2px ${s.color}` }}/> : null;
                      })}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Selected day detail */}
      <div style={{ padding:'14px 16px 0' }}>
        <GlassCard pad={14}>
          <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:10 }}>
            <div style={{ fontFamily:FDISP, fontSize:22, fontWeight:700, color:N.text, letterSpacing:-1 }}>
              {String(viewMonth).padStart(2,'0')}.{String(selectedDay).padStart(2,'0')}
            </div>
            <div style={{ fontFamily:FMONO, fontSize:9, color:N.textMid, letterSpacing:1 }}>
              {wkEN[new Date(viewYear, viewMonth-1, selectedDay).getDay()]}
              {isCurrentMonth && selectedDay === now.getDate() && <span style={{ color:N.lime, marginLeft:4 }}>● TODAY</span>}
            </div>
            <div style={{ flex:1 }}/>
            {selData ? (
              <div style={{ fontFamily:FDISP, fontSize:18, fontWeight:700, color:N.pink, letterSpacing:-0.5 }}>{yen(selData.total)}</div>
            ) : (
              <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMute, letterSpacing:1 }}>NO_DATA</div>
            )}
          </div>

          {!filterPlayer && selData && selPlayerSales && selPlayerSales.length > 0 && (
            <>
              <div style={{ fontFamily:FMONO, fontSize:9, color:N.cyan, letterSpacing:2, marginTop:4, marginBottom:6 }}>// BY_STAFF</div>
              {selPlayerSales.map(({player,total}) => {
                const pct = selData.total > 0 ? total/selData.total*100 : 0;
                return (
                  <div key={player} style={{ display:'flex', alignItems:'center', gap:8, padding:'3px 0' }}>
                    <div style={{ width:22, height:22, background:N.surface3, color:N.text, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:11, fontWeight:700, borderRadius:1, flexShrink:0 }}>{player[0]}</div>
                    <div style={{ fontFamily:FDISP, fontSize:11, fontWeight:600, width:60, color:N.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{player}</div>
                    <div style={{ flex:1, height:4, background:N.surface2, overflow:'hidden' }}>
                      <div style={{ width:`${pct}%`, height:'100%', background:`linear-gradient(90deg,${N.pink},${N.cyan})` }}/>
                    </div>
                    <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:700, width:60, textAlign:'right', color:N.text }}>{yen(total)}</div>
                  </div>
                );
              })}
            </>
          )}

          {filterPlayer && selData && Object.keys(selStoreSales).length > 0 && (
            <>
              <div style={{ fontFamily:FMONO, fontSize:9, color:N.cyan, letterSpacing:2, marginTop:4, marginBottom:6 }}>// BY_STORE</div>
              {STORES.map(s => {
                const v = selStoreSales[s.id] || 0;
                const pct = selData.total > 0 ? v/selData.total*100 : 0;
                return (
                  <div key={s.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0' }}>
                    <div style={{ width:6, height:6, background:s.color, boxShadow:`0 0 4px ${s.color}`, flexShrink:0 }}/>
                    <div style={{ fontFamily:FDISP, fontSize:11, fontWeight:700, width:48, color:s.color, letterSpacing:1 }}>{s.name}</div>
                    <div style={{ flex:1, height:4, background:N.surface2, overflow:'hidden' }}>
                      <div style={{ width:`${pct}%`, height:'100%', background:s.color }}/>
                    </div>
                    <div style={{ fontFamily:FMONO, fontSize:10, fontWeight:700, width:60, textAlign:'right', color:v?N.text:N.textMute }}>{v?yen(v):'──'}</div>
                  </div>
                );
              })}
            </>
          )}

          {filterPlayer && selData && Object.keys(selStoreSales).length === 0 && (
            <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMute, letterSpacing:1 }}>STORE_DATA: NULL // TOTAL_ONLY</div>
          )}
          {!selData && (
            <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMute, letterSpacing:1 }}>NO_RECORDS_FOUND</div>
          )}
        </GlassCard>
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► SCREEN: ME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ScreenPersonal({ sales, players, loading, currentPlayer }) {
  const [mePlayer, setMePlayer] = useState(null);
  useEffect(() => { if (currentPlayer && !mePlayer) setMePlayer(currentPlayer); }, [currentPlayer]);

  const now = new Date();
  const curMonthPrefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthPrefix = useMemo(() => {
    if (!mePlayer) return curMonthPrefix;
    const has = sales.some(s => s.player === mePlayer.name && s.date.startsWith(curMonthPrefix));
    if (has) return curMonthPrefix;
    const months = [...new Set(sales.filter(s => s.player === mePlayer.name).map(s => s.date.slice(0,7)))].sort().reverse();
    return months[0] || curMonthPrefix;
  }, [sales, mePlayer, curMonthPrefix]);

  const isCurMonth = monthPrefix === curMonthPrefix;
  const periodDate = new Date(monthPrefix + '-01');
  const dayOfMonth = isCurMonth ? now.getDate() : new Date(periodDate.getFullYear(), periodDate.getMonth()+1, 0).getDate();
  const daysInMonth = new Date(periodDate.getFullYear(), periodDate.getMonth()+1, 0).getDate();

  const mySales = useMemo(() => {
    if (!mePlayer) return [];
    return sales.filter(s => s.player === mePlayer.name && s.date.startsWith(monthPrefix));
  }, [sales, mePlayer, monthPrefix]);

  const monthly = mySales.reduce((a,s) => a+s.amount, 0);
  const goal = mePlayer?.monthly_goal || 0;
  const pct = goal > 0 ? Math.min(monthly/goal*100,100) : 0;
  const projected = dayOfMonth > 0 && monthly > 0 ? Math.round(monthly/dayOfMonth*daysInMonth) : 0;

  const allMonthRank = useMemo(() => {
    const m = {};
    for (const s of sales) { if (!s.date.startsWith(monthPrefix)) continue; m[s.player] = (m[s.player]||0) + s.amount; }
    const sorted = Object.entries(m).sort((a,b)=>b[1]-a[1]);
    return mePlayer ? (sorted.findIndex(([p])=>p===mePlayer.name)+1) : 0;
  }, [sales, mePlayer, monthPrefix]);

  const dailyMap = useMemo(() => {
    const m = {};
    for (const s of mySales) {
      if (!m[s.date]) m[s.date] = { total:0, stores:{} };
      m[s.date].total += s.amount;
      if (s.store) m[s.date].stores[s.store] = (m[s.date].stores[s.store]||0) + s.amount;
    }
    return m;
  }, [mySales]);

  const days = useMemo(() => {
    const arr = [];
    const [py, pm] = monthPrefix.split('-').map(Number);
    for (let d = dayOfMonth; d >= Math.max(1, dayOfMonth-13); d--) {
      const dStr = `${monthPrefix}-${String(d).padStart(2,'0')}`;
      const data = dailyMap[dStr];
      const dow = new Date(py, pm-1, d).getDay();
      arr.push({ d, w:wkEN[dow], data, today: isCurMonth && d===now.getDate(), dateStr:dStr });
    }
    return arr;
  }, [dailyMap, dayOfMonth, monthPrefix, isCurMonth, now]);

  return (
    <div style={{ height:'100%', overflow:'auto', paddingBottom:90 }}>
      <SectionHeader idx="04" label="PROFILE" sub={`▸ ${monthPrefix.replace('-','.')} // ${isCurMonth?'LIVE':'ARCHIVE'}`}/>

      {/* Player chips */}
      <div style={{ padding:'0 0 10px', overflowX:'auto' }}>
        <div style={{ display:'flex', gap:4, padding:'0 16px', minWidth:'max-content' }}>
          {players.map(p => {
            const on = mePlayer?.id === p.id;
            return (
              <div key={p.id} onClick={() => setMePlayer(p)} style={{
                flexShrink:0, display:'flex', alignItems:'center', gap:5,
                padding:on?'4px 10px 4px 4px':'4px',
                background:on?`linear-gradient(135deg, ${N.pink}, ${N.violet})`:N.surface,
                border:on?'none':`1px solid ${N.line2}`,
                color:on?'#fff':N.textMid, cursor:'pointer', borderRadius:2,
                boxShadow:on?`0 0 12px ${N.pink}50`:'none',
              }}>
                <div style={{ width:24, height:24, background:on?N.bg:N.surface2, color:on?N.pink:N.text, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:11, fontWeight:700, borderRadius:1 }}>{p.name[0]}</div>
                {on && <div style={{ fontFamily:FDISP, fontSize:11, fontWeight:700, letterSpacing:1 }}>{p.name}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {!mePlayer ? (
        <div style={{ padding:'40px 20px', textAlign:'center', fontFamily:FMONO, fontSize:11, color:N.textMid, letterSpacing:2 }}>◯ SELECT_TARGET</div>
      ) : (
        <>
          {/* Hero card */}
          <div style={{ padding:'0 16px 12px' }}>
            <div style={{
              background:`linear-gradient(160deg, ${N.surface}, ${N.bg2})`,
              border:`1px solid ${N.pink}40`, borderRadius:2, padding:16,
              position:'relative', overflow:'hidden',
              boxShadow:`0 0 24px ${N.pink}20`,
            }}>
              <div style={{ position:'absolute', top:0, right:0, bottom:0, width:'40%',
                background:`radial-gradient(circle at top right, ${N.pink}30, transparent 70%)` }}/>

              <div style={{ display:'flex', alignItems:'flex-start', gap:14, position:'relative' }}>
                <div style={{
                  width:64, height:64, background:`linear-gradient(135deg, ${N.pink}, ${N.violet})`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:FDISP, fontSize:30, fontWeight:700, color:'#fff',
                  boxShadow:`0 0 20px ${N.pink}60`, borderRadius:2,
                }}>{mePlayer.name[0]}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:FMONO, fontSize:9, color:N.cyan, letterSpacing:2, fontWeight:700 }}>USER_ID // {String(mePlayer.id).padStart(3,'0')}</div>
                  <div style={{ fontFamily:FDISP, fontSize:22, fontWeight:700, color:N.text, marginTop:2, letterSpacing:-0.5 }}>{mePlayer.name}</div>
                  {allMonthRank > 0 && (
                    <div style={{ display:'inline-flex', alignItems:'center', gap:4, marginTop:6, padding:'3px 8px', background:`${N.lime}15`, border:`1px solid ${N.lime}60`, fontFamily:FMONO, fontSize:9, fontWeight:700, color:N.lime, letterSpacing:1.5, borderRadius:2 }}>
                      <span>{I.star}</span> RANK_{String(allMonthRank).padStart(2,'0')}
                    </div>
                  )}
                </div>
              </div>

              {/* Goal */}
              {goal > 0 && (
                <div style={{ marginTop:14 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontFamily:FMONO, fontSize:9, marginBottom:5, letterSpacing:1.5 }}>
                    <span style={{ color:N.cyan }}>// GOAL_PROGRESS</span>
                    <span style={{ color:N.text, fontWeight:700 }}>{yen(monthly)} / {yen(goal)}</span>
                  </div>
                  <div style={{ height:8, background:N.surface3, position:'relative', overflow:'hidden' }}>
                    <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${pct}%`, background:`linear-gradient(90deg, ${N.pink}, ${N.cyan})`, boxShadow:`0 0 12px ${N.pink}80` }}/>
                    {projected > monthly && goal > 0 && (
                      <div style={{ position:'absolute', left:`${pct}%`, top:0, bottom:0, width:`${Math.min((projected-monthly)/goal*100, 100-pct)}%`, background:`repeating-linear-gradient(45deg, ${N.cyan}40, ${N.cyan}40 2px, transparent 2px, transparent 4px)` }}/>
                    )}
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', marginTop:5, alignItems:'baseline' }}>
                    <div>
                      <span style={{ fontFamily:FDISP, fontSize:22, fontWeight:700, color:N.pink, letterSpacing:-0.5 }}>{Math.round(pct)}</span>
                      <span style={{ fontFamily:FMONO, fontSize:10, color:N.textMid, marginLeft:2 }}>%_DONE</span>
                    </div>
                    <div style={{ fontFamily:FMONO, fontSize:9, color:N.textMid }}>
                      Δ_REM <span style={{ color:N.text, fontWeight:700 }}>{yen(Math.max(goal-monthly,0))}</span>
                    </div>
                  </div>
                </div>
              )}

              <div style={{ display:'flex', marginTop:14, paddingTop:10, borderTop:`1px solid ${N.line2}` }}>
                {[
                  { l:'CUR',   v:yenK(monthly), c:N.text },
                  { l:'PROJ',  v:projected?yenK(projected):'──', c:N.cyan },
                  { l:'DAYS',  v:`${Object.keys(dailyMap).length}D`, c:N.lime },
                ].map((s,i) => (
                  <div key={s.l} style={{ flex:1, textAlign:'center', borderRight:i<2?`1px solid ${N.line2}`:'none' }}>
                    <div style={{ fontFamily:FMONO, fontSize:8, color:N.textMid, letterSpacing:2 }}>{s.l}</div>
                    <div style={{ fontFamily:FDISP, fontSize:14, fontWeight:700, color:s.c, marginTop:2, letterSpacing:-0.3 }}>{s.v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Daily breakdown */}
          <div style={{ padding:'0 16px 6px', display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:6, height:6, background:N.cyan, boxShadow:`0 0 6px ${N.cyan}` }}/>
            <div style={{ fontFamily:FMONO, fontSize:10, color:N.cyan, fontWeight:700, letterSpacing:2 }}>// DAILY_LOG</div>
            <div style={{ flex:1, height:1, background:`linear-gradient(90deg,${N.cyan}40,transparent)` }}/>
          </div>
          <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:3 }}>
            {days.map(day => (
              <div key={day.d} style={{
                display:'flex', alignItems:'center', gap:10, padding:'8px 10px',
                background: day.today?`linear-gradient(90deg, ${N.pink}15, transparent)`:N.surface,
                border:`1px solid ${day.today?N.pink+'80':N.line2}`,
                borderRadius:2, position:'relative',
                boxShadow:day.today?`0 0 8px ${N.pink}30`:'none',
              }}>
                <div style={{ width:32, textAlign:'center' }}>
                  <div style={{ fontFamily:FDISP, fontSize:15, fontWeight:700, color:N.text, letterSpacing:-0.5 }}>{String(day.d).padStart(2,'0')}</div>
                  <div style={{ fontFamily:FMONO, fontSize:7, color:N.textMid, marginTop:1, letterSpacing:1 }}>{day.w}</div>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  {day.data && day.data.total > 0 ? (
                    <>
                      <div style={{ display:'flex', gap:1, height:4, overflow:'hidden', background:N.surface2 }}>
                        {STORES.map(s => {
                          const v = day.data.stores[s.id]||0;
                          const w = day.data.total>0 ? v/day.data.total*100 : 0;
                          return w > 0 ? <div key={s.id} style={{ width:`${w}%`, background:s.color, boxShadow:`0 0 4px ${s.color}` }}/> : null;
                        })}
                        {Object.keys(day.data.stores).length === 0 && (
                          <div style={{ width:'100%', background:`linear-gradient(90deg,${N.pink},${N.cyan})` }}/>
                        )}
                      </div>
                      <div style={{ display:'flex', gap:6, marginTop:3, fontFamily:FMONO, fontSize:8 }}>
                        {Object.keys(day.data.stores).length > 0 ? (
                          STORES.map(s => {
                            const v = day.data.stores[s.id]||0;
                            return v > 0 ? (
                              <span key={s.id} style={{ color:s.color, fontWeight:700 }}>{s.name} {yenK(v)}</span>
                            ) : null;
                          })
                        ) : (
                          <span style={{ color:N.textMute, letterSpacing:1 }}>TOTAL_ONLY</span>
                        )}
                      </div>
                    </>
                  ) : (
                    <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMute, letterSpacing:1 }}>──</div>
                  )}
                </div>
                <div style={{ fontFamily:FDISP, fontSize:14, fontWeight:700, color:day.today?N.pink:N.text, letterSpacing:-0.3 }}>
                  {day.data && day.data.total > 0 ? yen(day.data.total) : '──'}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► SCREEN: SYS (Settings)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ScreenSettings({ players, onRefresh }) {
  const [goalEdit, setGoalEdit] = useState(null);
  const [goalVal, setGoalVal]   = useState('');

  const handleSaveGoal = async (player) => {
    if (!goalVal) return;
    const val = Number(goalVal.replace(/,/g,''));
    await db.from('players').update({ monthly_goal: val }).eq('id', player.id);
    setGoalEdit(null);
    onRefresh();
  };

  return (
    <div style={{ height:'100%', overflow:'auto', paddingBottom:90 }}>
      <SectionHeader idx="05" label="SYSTEM" sub="▸ SETTINGS // v3.0"/>

      {/* App banner */}
      <div style={{ padding:'0 16px 14px' }}>
        <div style={{
          background:`linear-gradient(135deg, ${N.pink}20, ${N.cyan}10)`,
          border:`1px solid ${N.line2}`, borderRadius:2, padding:14,
          position:'relative', overflow:'hidden',
        }}>
          <div className="grid-bg" style={{ position:'absolute', inset:0, opacity:0.5 }}/>
          <div style={{ position:'relative', display:'flex', alignItems:'center', gap:14 }}>
            <div style={{ width:48, height:48, background:`linear-gradient(135deg, ${N.pink}, ${N.violet})`, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:22, fontWeight:700, boxShadow:`0 0 16px ${N.pink}60`, borderRadius:2 }}>C</div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:FMONO, fontSize:9, color:N.cyan, letterSpacing:2, fontWeight:700 }}>// CATCH_SYS_v3</div>
              <div style={{ fontFamily:FDISP, fontSize:16, fontWeight:700, color:N.text, marginTop:1, letterSpacing:-0.3 }}>NEO-TOKYO EDITION</div>
              <div style={{ fontFamily:FMONO, fontSize:9, color:N.textMid, marginTop:2, letterSpacing:1 }}>{players.length} OPERATORS // 4 NODES</div>
            </div>
          </div>
        </div>
      </div>

      {/* Goals */}
      <div style={{ padding:'0 16px 8px', display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ width:6, height:6, background:N.pink }}/>
        <div style={{ fontFamily:FMONO, fontSize:10, color:N.pink, fontWeight:700, letterSpacing:2 }}>// MONTHLY_TARGETS</div>
        <div style={{ flex:1, height:1, background:`linear-gradient(90deg,${N.pink}40,transparent)` }}/>
      </div>
      <div style={{ padding:'0 16px', display:'flex', flexDirection:'column', gap:3 }}>
        {players.map(p => (
          <div key={p.id} style={{
            display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
            background:N.surface, border:`1px solid ${N.line2}`, borderRadius:2,
          }}>
            <div style={{ width:30, height:30, background:`linear-gradient(135deg, ${N.pink}, ${N.violet})`, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:FDISP, fontSize:14, fontWeight:700, borderRadius:2, flexShrink:0 }}>{p.name[0]}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:FDISP, fontSize:13, fontWeight:600, color:N.text }}>{p.name}</div>
              {goalEdit === p.id ? (
                <input autoFocus value={goalVal} onChange={e=>setGoalVal(e.target.value)}
                  onBlur={() => { if (goalVal) handleSaveGoal(p); else setGoalEdit(null); }}
                  onKeyDown={e => e.key==='Enter' && handleSaveGoal(p)}
                  style={{
                    fontFamily:FMONO, fontSize:11, fontWeight:700, color:N.cyan,
                    background:'transparent', borderBottom:`1px solid ${N.cyan}`,
                    padding:'2px 0', width:100, marginTop:2,
                  }}
                  placeholder="800000"
                />
              ) : (
                <div style={{ fontFamily:FMONO, fontSize:10, color:N.textMid, marginTop:1, letterSpacing:1 }}>
                  TARGET: <span style={{ color:p.monthly_goal?N.cyan:N.textMute }}>{p.monthly_goal?yen(p.monthly_goal):'NULL'}</span>
                </div>
              )}
            </div>
            <div onClick={()=>{ setGoalEdit(p.id); setGoalVal(p.monthly_goal?String(p.monthly_goal):''); }} style={{
              padding:'4px 10px', border:`1px solid ${N.lime}60`,
              fontFamily:FMONO, fontSize:9, fontWeight:700, color:N.lime,
              cursor:'pointer', letterSpacing:1, borderRadius:2,
            }}>EDIT</div>
          </div>
        ))}
      </div>

      {/* Data export */}
      <div style={{ padding:'14px 16px 8px', display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ width:6, height:6, background:N.cyan }}/>
        <div style={{ fontFamily:FMONO, fontSize:10, color:N.cyan, fontWeight:700, letterSpacing:2 }}>// DATA_OUT</div>
        <div style={{ flex:1, height:1, background:`linear-gradient(90deg,${N.cyan}40,transparent)` }}/>
      </div>
      <div style={{ padding:'0 16px' }}>
        <div onClick={async () => {
          const { data } = await db.from('sales').select('*').order('date', { ascending: true });
          if (!data) return;
          const csv = ['date,player,store,amount,half_month_start',
            ...data.map(r => `${r.date},${r.player},${r.store||''},${r.amount},${r.half_month_start||''}`)
          ].join('\n');
          const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `catch-sales-${new Date().toISOString().slice(0,10)}.csv`;
          a.click(); URL.revokeObjectURL(url);
        }} style={{
          padding:'12px 14px', background:N.surface, border:`1px solid ${N.cyan}60`,
          cursor:'pointer', borderRadius:2, display:'flex', alignItems:'center', gap:10,
          boxShadow:`0 0 8px ${N.cyan}20`,
        }}>
          <span style={{ color:N.cyan }}>{I.bolt}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:FDISP, fontSize:13, fontWeight:700, color:N.text, letterSpacing:1 }}>EXPORT_CSV</div>
            <div style={{ fontFamily:FMONO, fontSize:9, color:N.textMid, marginTop:1, letterSpacing:1 }}>DUMP ALL SALES DATA</div>
          </div>
          <span style={{ color:N.cyan }}>{I.chev}</span>
        </div>
      </div>

      {/* Footer */}
      <div style={{ textAlign:'center', padding:'20px 0 12px', fontFamily:FMONO, fontSize:8, color:N.textMute, letterSpacing:3 }}>
        ◤ CATCH // v3.0 // NEO-TOKYO ◢
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ► APP ROOT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function App() {
  const [tab, setTab] = useState(() => localStorage.getItem('v3.tab') || 'rank');
  const [players, setPlayers] = useState([]);
  const [sales, setSales] = useState([]);
  const [loading, setLoading] = useState(true);
  const [currentPlayer, setCurrentPlayer] = useState(() => {
    const stored = localStorage.getItem('v3.player');
    return stored ? JSON.parse(stored) : null;
  });

  const loadData = useCallback(async () => {
    const [{ data:pl }, { data:sl }] = await Promise.all([
      db.from('players').select('*').eq('active', true).order('name'),
      db.from('sales').select('*').order('date', { ascending: false }).limit(5000),
    ]);
    if (pl) setPlayers(pl);
    if (sl) setSales(sl);
    setLoading(false);
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  useEffect(() => {
    if (players.length === 0) return;
    if (currentPlayer) {
      const fresh = players.find(p => p.id === currentPlayer.id);
      if (fresh) { setCurrentPlayer(fresh); localStorage.setItem('v3.player', JSON.stringify(fresh)); }
    } else {
      setCurrentPlayer(players[0]);
      localStorage.setItem('v3.player', JSON.stringify(players[0]));
    }
  }, [players]);

  const handleSelectPlayer = (p) => { setCurrentPlayer(p); localStorage.setItem('v3.player', JSON.stringify(p)); };
  const handleSetTab = (t) => { setTab(t); localStorage.setItem('v3.tab', t); };

  return (
    <div style={{ width:'100%', height:'100%', background:N.bg, color:N.text, fontFamily:FSANS, position:'relative', overflow:'hidden' }}>
      {/* Background grid */}
      <div className="grid-bg" style={{ position:'absolute', inset:0, opacity:0.3, pointerEvents:'none' }}/>
      {/* Top corner accents */}
      <div style={{ position:'absolute', top:'env(safe-area-inset-top,44px)', left:0, right:0, height:1, background:`linear-gradient(90deg, transparent, ${N.pink}80, ${N.cyan}80, transparent)`, pointerEvents:'none', zIndex:2 }}/>

      {/* Status bar safe area */}
      <div style={{ height:'env(safe-area-inset-top,44px)', background:N.bg }}/>

      <div style={{ position:'absolute', top:'env(safe-area-inset-top,44px)', left:0, right:0, bottom:0, overflow:'hidden' }}>
        {tab === 'rec'  && <ScreenRecord  players={players} sales={sales} currentPlayer={currentPlayer} setCurrentPlayer={handleSelectPlayer} onSaved={loadData}/>}
        {tab === 'rank' && <ScreenRanking sales={sales} loading={loading}/>}
        {tab === 'cal'  && <ScreenCalendar sales={sales} players={players} loading={loading}/>}
        {tab === 'me'   && <ScreenPersonal sales={sales} players={players} loading={loading} currentPlayer={currentPlayer}/>}
        {tab === 'set'  && <ScreenSettings players={players} onRefresh={loadData}/>}
        <BottomNav active={tab} onNav={handleSetTab}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
